<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jobs – Off-Campus Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Off-Campus Jobs</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="jobs.html">Jobs</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <h2 class="mb-3">Browse Jobs</h2>

    <form id="job-filter-form" class="row g-2 mb-3">
        <div class="col-md-4">
            <input type="text" id="search" class="form-control" placeholder="Search by title">
        </div>
        <div class="col-md-4">
            <input type="text" id="location" class="form-control" placeholder="Location">
        </div>
        <div class="col-md-4 d-grid d-md-flex gap-2">
            <button type="submit" class="btn btn-primary">Filter</button>
            <button type="button" id="reset-btn" class="btn btn-outline-secondary">Reset</button>
        </div>
    </form>

    <div id="jobs-list" class="list-group mb-3">
        <!-- filled by JS -->
    </div>
    <p id="jobs-empty" class="text-muted d-none">No jobs found. Once backend API is wired, jobs will appear here.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
const jobsList = document.getElementById('jobs-list');
const jobsEmpty = document.getElementById('jobs-empty');

function renderJobs(jobs) {
    jobsList.innerHTML = '';
    if (!jobs || jobs.length === 0) {
        jobsEmpty.classList.remove('d-none');
        return;
    }
    jobsEmpty.classList.add('d-none');
    jobs.forEach(job => {
        const div = document.createElement('div');
        div.className = 'list-group-item';
        div.innerHTML = `<div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1">${job.title}</h5>
                <small class="text-muted">${job.posted_date || ''}</small>
            </div>
            <p class="mb-1 text-muted">${job.company_name} · ${job.location || ''}</p>
            <p class="mb-1"><strong>Skills:</strong> ${job.required_skills || ''}</p>
            <a href="${job.job_link || '#'}" target="_blank" class="btn btn-sm btn-outline-primary mt-1">View Job</a>`;
        jobsList.appendChild(div);
    });
}

function loadJobs() {
    const search = document.getElementById('search').value;
    const location = document.getElementById('location').value;
    if (window.JobApi && typeof JobApi.fetchJobs === 'function') {
        JobApi.fetchJobs({ search, location })
            .then(renderJobs)
            .catch(() => jobsEmpty.classList.remove('d-none'));
    } else {
        jobsEmpty.classList.remove('d-none');
    }
}

document.getElementById('job-filter-form').addEventListener('submit', function (e) {
    e.preventDefault();
    loadJobs();
});

document.getElementById('reset-btn').addEventListener('click', function () {
    document.getElementById('search').value = '';
    document.getElementById('location').value = '';
    loadJobs();
});

// initial load
loadJobs();
</script>
</body>
</html>
