<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Off-Campus Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<main class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg auth-card">
        <div class="card-body p-4">
            <h3 class="mb-3 text-center">Welcome Back</h3>
            <p class="text-muted small text-center mb-4">
                Sign in to access your personalized job recommendations and application tracker.
            </p>
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="small text-center mt-3 mb-0">
                Don’t have an account?
                <a href="#" onclick="alert('Use backend Django /admin or registration page. Frontend auth wiring is optional.'); return false;">
                    Create one via backend
                </a>
            </p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    alert('This static frontend is mainly for UI demo. Use the Django login page for full auth, or wire this form to a REST login endpoint.');
});
</script>
</body>
</html>
