{% extends "base.html" %}
{% block title %}Register - Off-Campus Job Portal{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3 text-center">Create Account</h2>
        <form method="post" class="card card-body shadow-sm">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-2">Register</button>
        </form>
    </div>
</div>
{% endblock %}
